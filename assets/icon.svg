<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81ECEC"/>
      <stop offset="100%" style="stop-color:#00CEC9"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8A5C2"/>
      <stop offset="100%" style="stop-color:#E84393"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <g transform="translate(24, 24)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="rgba(255,255,255,0.2)"/>
    <!-- f(x) 符号 -->
    <text x="40" y="36" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold" font-family="serif" font-style="italic">f</text>
    <text x="52" y="36" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="14" font-family="Arial">(x)</text>
    <!-- 表格线 -->
    <line x1="12" y1="48" x2="68" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <line x1="12" y1="56" x2="68" y2="56" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <line x1="12" y1="64" x2="68" y2="64" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    <!-- =SUM 文字 -->
    <text x="40" y="70" text-anchor="middle" fill="#fff" font-size="8" font-family="Courier New" font-weight="bold">=SUM(A1:A10)</text>
  </g>
  <g transform="translate(74, 16)">
    <rect x="-16" y="-12" width="32" height="24" rx="12" fill="url(#badge)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="Arial">FX</text>
  </g>
</svg>
